name: ci

# Dogfood: every push and PR boots a real VM on the runner through the
# composite action, proves SSH + cloud-init, and destroys it through the
# script. ubuntu-latest x64 only — no KVM on arm64 or macOS runners.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck the product
        run: shellcheck qemu-vm.sh

  vm:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Boot a VM via the action (generated user-data path)
        uses: ./action
        id: vm

      - name: Prove SSH and cloud-init, the way a consumer would
        run: |
          ssh -p ${{ steps.vm.outputs.ssh-port }} \
            -i ${{ steps.vm.outputs.ssh-identity }} \
            -o UserKnownHostsFile=/tmp/qvm-known-hosts \
            -o StrictHostKeyChecking=accept-new \
            -o IdentitiesOnly=yes \
            ${{ steps.vm.outputs.ssh-user }}@127.0.0.1 \
            'set -e; uname -a; cloud-init status; sudo true'

      - name: Destroy through the script
        env:
          QVM_DIR: ${{ steps.vm.outputs.vm-dir }}
        run: ./qemu-vm.sh destroy-vm

      - name: Console log on failure
        if: failure()
        run: tail -n 200 "${{ steps.vm.outputs.vm-dir }}/console.log" 2>/dev/null || true
