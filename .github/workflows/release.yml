name: release

# Tag vX.Y.Z -> GitHub release carrying the script + its sha256, then
# move the plain major tag (v1) to the same commit. Enable immutable
# releases in the repository settings so published releases lock.

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Checksum the artifact
        run: sha256sum qemu-vm.sh > qemu-vm.sh.sha256

      - name: Create the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            qemu-vm.sh qemu-vm.sh.sha256 \
            --title "$GITHUB_REF_NAME" \
            --notes "qemu-vm.sh $GITHUB_REF_NAME — verify with qemu-vm.sh.sha256. Vendor the file, download from this release, or use the composite action (cur8s/qemu/action@${GITHUB_REF_NAME%%.*})."

      - name: Move the major convenience tag
        run: |
          major="${GITHUB_REF_NAME%%.*}"
          git tag -f "$major"
          git push -f origin "$major"
